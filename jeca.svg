<svg width="400" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c987;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a574;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="#d4a574"/>
  
  <!-- Hair -->
  <path d="M 140 110 Q 140 50 200 50 Q 260 50 260 110" fill="#5c3d2e"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="110" r="8" fill="#2b2b2b"/>
  <circle cx="220" cy="110" r="8" fill="#2b2b2b"/>
  <circle cx="182" cy="108" r="3" fill="white"/>
  <circle cx="222" cy="108" r="3" fill="white"/>
  
  <!-- Nose -->
  <path d="M 200 120 L 195 135 L 205 135" fill="#c17a4d"/>
  
  <!-- Mouth -->
  <path d="M 185 145 Q 200 155 215 145" stroke="#8b5e34" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="160" y="190" width="80" height="100" fill="#8b5e34" rx="10"/>
  
  <!-- Arms -->
  <rect x="100" y="210" width="60" height="20" fill="#d4a574" rx="10"/>
  <rect x="240" y="210" width="60" height="20" fill="#d4a574" rx="10"/>
  
  <!-- Legs -->
  <rect x="170" y="300" width="20" height="80" fill="#5c3d2e" rx="10"/>
  <rect x="210" y="300" width="20" height="80" fill="#5c3d2e" rx="10"/>
  
  <!-- Shoes -->
  <ellipse cx="180" cy="385" rx="15" ry="10" fill="#3f2306"/>
  <ellipse cx="220" cy="385" rx="15" ry="10" fill="#3f2306"/>
  
  <!-- Hat -->
  <ellipse cx="200" cy="50" rx="70" ry="20" fill="#5c3d2e"/>
  <path d="M 150 50 L 145 30 L 255 30 L 250 50" fill="#8b5e34"/>
  
  <!-- Smile lines (character expression) -->
  <path d="M 160 130 Q 155 140 160 150" stroke="#8b5e34" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 240 130 Q 245 140 240 150" stroke="#8b5e34" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
