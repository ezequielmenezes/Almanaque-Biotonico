<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c17a4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5e34;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#f0c987" opacity="0.2"/>
    </pattern>
    
    <pattern id="stripes" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#8b5e34" stroke-width="2" opacity="0.1"/>
    </pattern>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Overlay patterns -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#stripes)"/>
  
  <!-- Decorative vintage ornaments - top left -->
  <g opacity="0.15">
    <circle cx="150" cy="100" r="80" fill="none" stroke="#2b2b2b" stroke-width="3"/>
    <circle cx="150" cy="100" r="60" fill="none" stroke="#2b2b2b" stroke-width="1"/>
    <circle cx="150" cy="100" r="40" fill="none" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="70" y1="100" x2="230" y2="100" stroke="#2b2b2b" stroke-width="2"/>
    <line x1="150" y1="20" x2="150" y2="180" stroke="#2b2b2b" stroke-width="2"/>
  </g>
  
  <!-- Decorative vintage ornaments - top right -->
  <g opacity="0.12" transform="translate(1770, 100)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#2b2b2b" stroke-width="3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#2b2b2b" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#2b2b2b" stroke-width="2"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#2b2b2b" stroke-width="2"/>
  </g>
  
  <!-- Decorative elements - bottom left -->
  <g opacity="0.1">
    <rect x="80" y="950" width="200" height="50" fill="none" stroke="#2b2b2b" stroke-width="2"/>
    <line x1="90" y1="960" x2="250" y2="960" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="90" y1="975" x2="250" y2="975" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="90" y1="990" x2="250" y2="990" stroke="#2b2b2b" stroke-width="1"/>
  </g>
  
  <!-- Decorative elements - bottom right -->
  <g opacity="0.1">
    <rect x="1640" y="950" width="200" height="50" fill="none" stroke="#2b2b2b" stroke-width="2"/>
    <line x1="1650" y1="960" x2="1810" y2="960" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="1650" y1="975" x2="1810" y2="975" stroke="#2b2b2b" stroke-width="1"/>
    <line x1="1650" y1="990" x2="1810" y2="990" stroke="#2b2b2b" stroke-width="1"/>
  </g>
  
  <!-- Central design elements -->
  <g opacity="0.08">
    <path d="M 960 200 L 1100 300 L 960 400 L 820 300 Z" fill="none" stroke="#2b2b2b" stroke-width="2"/>
    <path d="M 960 300 L 1020 350 L 960 400 L 900 350 Z" fill="none" stroke="#2b2b2b" stroke-width="1"/>
  </g>
  
  <!-- Vintage text styling -->
  <defs>
    <style>
      .vintage-text {
        font-family: Georgia, serif;
        font-weight: bold;
        text-anchor: middle;
        letter-spacing: 2px;
      }
    </style>
  </defs>
  
  <!-- Main title -->
  <text x="960" y="480" class="vintage-text" font-size="140" fill="#3f2306" opacity="0.12">ALMANAQUE</text>
  <text x="960" y="620" class="vintage-text" font-size="120" fill="#3f2306" opacity="0.10">1942</text>
  
  <!-- Decorative line elements -->
  <line x1="400" y1="540" x2="1520" y2="540" stroke="#3f2306" stroke-width="1" opacity="0.08"/>
  <line x1="500" y1="550" x2="1420" y2="550" stroke="#3f2306" stroke-width="1" opacity="0.06"/>
</svg>
